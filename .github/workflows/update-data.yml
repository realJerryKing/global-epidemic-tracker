name: Update Epidemic Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and validate epidemic data
        run: |
          mkdir -p data/processed data/cache docs/data
          python scripts/fetch_data.py --fetch --validate --max-validations 20 --export-json --export-geojson --summary

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ docs/data/ -f
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "data: auto-update ($TIMESTAMP)"
            git push
          fi
