<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Global Epidemic Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1419;--panel:#1c2733;--card:#22303c;--border:#38444d;--text:#8899a6;--bright:#e7e9ea;--muted:#657786;--red:#f4212e;--amber:#ffad1f;--green:#00ba7c;--blue:#1d9bf0;--purple:#794bc4;--cyan:#00c9db}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px}
a{color:var(--cyan);text-decoration:none}
.topbar{background:var(--red);color:white;text-align:center;padding:4px;font-size:11px;font-weight:700;letter-spacing:0.03em}
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:700;color:var(--bright)}
.hdr-r{display:flex;align-items:center;gap:8px}
.sel{background:var(--card);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit}
.news-bar{background:var(--panel);border-bottom:1px solid var(--border);height:26px;overflow:hidden;display:flex;align-items:center}
.news-lbl{background:var(--red);color:white;padding:0 8px;font-size:10px;font-weight:700;height:100%;display:flex;align-items:center;flex-shrink:0}
.news-scroll{flex:1;height:100%;overflow:hidden;position:relative}
.news-inner{position:absolute;width:100%;animation:ns 4s linear infinite}
@keyframes ns{0%{top:0}100%{top:-50%}}
.ni{height:26px;line-height:26px;padding:0 12px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni .dot{color:var(--red);margin-right:6px}
.filters{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:8px;align-items:center}
.filters input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--bright);padding:6px 12px;border-radius:6px;font-size:13px;font-family:inherit}
.filters input:focus{outline:none;border-color:var(--blue)}
.filters input::placeholder{color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border)}
.st{background:var(--panel);padding:8px;text-align:center;border-right:1px solid var(--border)}.st:last-child{border-right:none}
.st-v{font-size:18px;font-weight:700}.st-l{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.st:nth-child(1) .st-v{color:var(--red)}.st:nth-child(2) .st-v{color:var(--amber)}.st:nth-child(3) .st-v{color:var(--blue)}.st:nth-child(4) .st-v{color:var(--purple)}.st:nth-child(5) .st-v{color:var(--green)}

.main{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 200px)}
#map{width:100%;height:100%}
.leaflet-container{background:#1a2332!important}
.leaflet-tile-pane{filter:brightness(0.6) saturate(0.3) contrast(1.2)}
.side{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
.side-body{flex:1;overflow-y:auto;padding:6px}
.side-body::-webkit-scrollbar{width:4px}.side-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:4px;cursor:pointer;border-left:3px solid transparent;transition:transform 0.1s}
.card:hover{transform:translateX(2px);border-color:var(--blue)}
.card.sc{border-left-color:var(--red)}.card.sh{border-left-color:var(--amber)}.card.sm{border-left-color:var(--blue)}.card.sl{border-left-color:var(--green)}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.card-nm{font-size:13px;font-weight:600;color:var(--bright);position:relative;cursor:help}
.card-nm:hover .tt{display:block}
.tt{display:none;position:absolute;top:100%;left:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:11px;font-weight:400;color:var(--text);width:240px;z-index:999;line-height:1.4;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.bge{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600}
.bc{background:rgba(244,33,46,0.15);color:var(--red)}.bh{background:rgba(255,173,31,0.15);color:var(--amber)}.bm{background:rgba(29,155,240,0.15);color:var(--blue)}.bl{background:rgba(0,186,124,0.15);color:var(--green)}
.card-loc{font-size:11px;color:var(--muted);margin-bottom:2px}
.card-st{display:flex;gap:8px;font-size:12px}.card-st b{color:var(--bright)}
.card-tg{display:flex;gap:3px;margin-top:3px;font-size:10px}
.tg{padding:1px 4px;border-radius:3px}.tv{background:rgba(0,186,124,0.1);color:var(--green)}.tp{background:rgba(255,173,31,0.1);color:var(--amber)}.th{background:rgba(244,33,46,0.12);color:var(--red)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:92%;max-width:650px;max-height:85vh;overflow-y:auto;padding:20px;position:relative}
.modal h2{color:var(--bright);font-size:17px;margin-bottom:6px}
.modal-desc{font-size:12px;color:var(--text);margin-bottom:10px}
.mcls{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.period-btns{display:flex;gap:6px;margin-bottom:10px}
.pbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.pbtn.active{background:var(--blue);color:white;border-color:var(--blue)}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;height:280px;margin-bottom:12px}
.msm{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ms{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.ms-v{font-size:18px;font-weight:700;color:var(--bright)}.ms-l{font-size:10px;color:var(--muted);margin-top:1px}

.ftr{background:var(--panel);border-top:1px solid var(--border);padding:5px;font-size:10px;color:var(--muted);text-align:center}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto}#map{height:45vh}.side{height:50vh}.stats{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

abia","SDN":"Sudan","SEN":"Senegal","SGP":"Singapore","SLE":"Sierra Leone","SLV":"El Salvador","SOM":"Somalia","SRB":"Serbia","SSD":"South Sudan","SVK":"Slovakia","SVN":"Slovenia","SWE":"Sweden","SYR":"Syria","TCD":"Chad","TGO":"Togo","THA":"Thailand","TJK":"Tajikistan","TKM":"Turkmenistan","TLS":"Timor-Leste","TTO":"Trinidad & Tobago","TUN":"Tunisia","TUR":"Turkey","TWN":"Taiwan","TZA":"Tanzania","UGA":"Uganda","UKR":"Ukraine","URY":"Uruguay","USA":"United States","UZB":"Uzbekistan","VEN":"Venezuela","VNM":"Vietnam","WB_LI":"Low-income","WB_LMI":"Lower-middle-income","WB_UMI":"Upper-middle-income","YEM":"Yemen","ZAF":"South Africa","ZMB":"Zambia","ZWE":"Zimbabwe"};

var DN={'Cholera':{zh:'霍乱',es:'Cólera',ru:'Холера',ar:'الكوليرا',de:'Cholera',fr:'Choléra',pt:'Cólera'},'Ebola Virus Disease':{zh:'埃博拉',es:'Ébola',ru:'Эбола',ar:'إيبولا',de:'Ebola',fr:'Ebola',pt:'Ébola'},'Dengue':{zh:'登革热',es:'Dengue',ru:'Денге',ar:'حمى الضنك',de:'Dengue',fr:'Dengue',pt:'Dengue'},'Measles':{zh:'麻疹',es:'Sarampión',ru:'Корь',ar:'الحصبة',de:'Masern',fr:'Rougeole',pt:'Sarampo'},'Hantavirus':{zh:'汉坦病毒',es:'Hantavirus',ru:'Хантавирус',ar:'هانتافيروس',de:'Hantavirus',fr:'Hantavirus',pt:'Hantavírus'},'Mpox':{zh:'猴痘',es:'Mpox',ru:'Мпокс',ar:'جدري القردة',de:'Mpox',fr:'Mpox',pt:'Mpox'},'Yellow Fever':{zh:'黄热病',es:'Fiebre amarilla',ru:'Жёлтая лихорадка',ar:'الحمى الصفراء',de:'Gelbfieber',fr:'Fièvre jaune',pt:'Febre amarela'},'Diphtheria':{zh:'白喉',es:'Difteria',ru:'Дифтерия',ar:'الدفتيريا',de:'Diphtherie',fr:'Diphtérie',pt:'Difteria'},'Influenza':{zh:'流感',es:'Gripe',ru:'Грипп',ar:'الإنفلوانزا',de:'Grippe',fr:'Grippe',pt:'Gripe'},'Lassa Fever':{zh:'拉沙热',es:'Fiebre de Lassa',ru:'Лихорадка Ласса',ar:'حمى لاسا',de:'Lassa-Fieber',fr:'Fièvre de Lassa',pt:'Febre de Lassa'},'Nipah Virus Infection':{zh:'尼帕病毒',es:'Nipah',ru:'Нипах',ar:'نيباه',de:'Nipah',fr:'Nipah',pt:'Nipah'},'Marburg Virus Disease':{zh:'马尔堡',es:'Marburgo',ru:'Марбург',ar:'ماربورگ',de:'Marburg',fr:'Marbourg',pt:'Marburg'},'Poliomyelitis':{zh:'脊髓灰质炎',es:'Polio',ru:'Полиомиелит',ar:'شلل الأطفال',de:'Polio',fr:'Polio',pt:'Pólio'},'Chikungunya':{zh:'基孔肯雅',es:'Chikungunya',ru:'Чикунгунья',ar:'شيكونغونيا',de:'Chikungunya',fr:'Chikungunya',pt:'Chikungunya'}};

var TIP={'Cholera':{zh:'急性腹泻传染病，经污染水传播',en:'Acute diarrheal disease via contaminated water'},'Ebola Virus Disease':{zh:'高致死率出血热，CFR可达90%',en:'Hemorrhagic fever, CFR up to 90%'},'Dengue':{zh:'蚊媒病毒病，年感染3.9亿',en:'Mosquito-borne, ~390M infections/year'},'Measles':{zh:'高传染性呼吸道病毒，可疫苗预防',en:'Highly contagious, vaccine-preventable'},'Hantavirus':{zh:'啮齿动物传播，安第斯病毒可人传人',en:'Rodent-borne, Andes virus H2H capable'},'Mpox':{zh:'密切接触传播，引起皮疹',en:'Close-contact, causes rash/fever'},'Diphtheria':{zh:'细菌感染，可疫苗预防',en:'Bacterial, vaccine-preventable'},'Lassa Fever':{zh:'啮齿动物传播出血热',en:'Rodent-borne hemorrhagic fever'},'Nipah Virus Infection':{zh:'果蝠传播，可人传人，CFR 40-75%',en:'Fruit bats, H2H, CFR 40-75%'},'Marburg Virus Disease':{zh:'严重出血热，CFR高达88%',en:'Hemorrhagic fever, CFR up to 88%'}};

function i(k){return(T[lang]&&T[lang][k])||T.en[k]||k}
function dn(n){return(lang==='en'||!DN[n])?n:(DN[n][lang]||n)}
function cn(iso){if(lang==='zh')return CZH[iso]||iso;return CEN[iso]||iso}
function tip(n){var t=TIP[n];return t?(t[lang]||t.en||''):''}
function fmt(n){if(!n||n===0)return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
function pct(a,b){return b>0?((a/b)*100).toFixed(1)+'%':'—'}
var ALIAS={'covid':['COVID-19','新冠','新型冠状病毒','coronavirus','SARS-CoV-2','corona'],'新冠':['COVID-19','coronavirus','corona'],'ebola':['Ebola Virus Disease','埃博拉','伊波拉'],'埃博拉':['Ebola Virus Disease','ebola'],'flu':['Influenza','流感','gripe','grippe'],'流感':['Influenza','flu','gripe'],'polio':['Poliomyelitis','脊髓灰质炎','小儿麻痹'],'脊髓灰质炎':['Poliomyelitis','polio','小儿麻痹'],'猴痘':['Mpox','monkeypox','猴痘'],'monkeypox':['Mpox','猴痘'],'霍乱':['Cholera','cholera'],'cholera':['Cholera','霍乱'],'登革热':['Dengue','dengue fever'],'dengue':['Dengue','登革热'],'麻疹':['Measles','measles'],'measles':['Measles','麻疹'],'汉坦':['Hantavirus','汉坦病毒','hanta'],'hanta':['Hantavirus','汉坦病毒'],'黄热':['Yellow Fever','黄热病'],'yellow fever':['Yellow Fever','黄热病'],'白喉':['Diphtheria','diphtheria'],'鼠疫':['Plague','plague'],'plague':['Plague','鼠疫'],'炭疽':['Anthrax','anthrax'],'拉沙':['Lassa Fever','拉沙热','lassa'],'尼帕':['Nipah Virus Infection','nipah','尼帕病毒'],'nipah':['Nipah Virus Infection','尼帕病毒'],'马尔堡':['Marburg Virus Disease','marburg'],'marburg':['Marburg Virus Disease','马尔堡'],'基孔肯雅':['Chikungunya','chikungunya'],'裂谷热':['Rift Valley Fever','rift valley']};
function fuzzy(t,q){if(!q)return true;var ql=q.toLowerCase();var w=ql.split(/\s+/);var h=t.toLowerCase();var match=w.every(function(x){return h.indexOf(x)>=0});if(match)return true;var expanded='';for(var k in ALIAS){if(ql.indexOf(k)>=0){ALIAS[k].forEach(function(a){expanded+=' '+a.toLowerCase()})}}if(expanded&&w.every(function(x){return(h+expanded).indexOf(x)>=0}))return true;return false}

function setLang(l){lang=l;document.getElementById('q').placeholder=i('search');document.getElementById('nlbl').textContent=i('brk');populateC();if(allData)render(allData)}
function doFilter(){if(allData)render(allData)}
function populateC(){
    if(!allData)return;var sel=document.getElementById('csel'),v=sel.value;
    sel.innerHTML='<option value="">'+i('allc')+'</option>';
    var seen={};allData.outbreaks.forEach(function(o){if(o.country_iso3&&o.country_iso3!=='MUL')seen[o.country_iso3]=true});
    Object.keys(seen).sort(function(a,b){return cn(a).localeCompare(cn(b))}).forEach(function(iso){
        var opt=document.createElement('option');opt.value=iso;opt.textContent=cn(iso);sel.appendChild(opt)});
    sel.value=v;
}

function init(){
    map=L.map('map',{zoomControl:true,attributionControl:false}).setView([20,0],2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    cl=L.markerClusterGroup({maxClusterRadius:50,showCoverageOnHover:false,iconCreateFunction:function(c){var n=c.getChildCount(),r=n<5?18:n<20?26:n<50?34:42;return L.divIcon({html:'<div style="width:'+r+'px;height:'+r+'px;border-radius:50%;background:rgba(244,33,46,0.2);border:2px solid rgba(244,33,46,0.5);display:flex;align-items:center;justify-content:center;color:#f4212e;font-weight:700;font-size:'+(r<26?10:12)+'px">'+n+'</div>',className:'',iconSize:[r,r]})}});
    map.addLayer(cl);
    load();setInterval(load,600000);
    window.addEventListener('resize',function(){map.invalidateSize()});
}

function load(){fetch('data/epidemics.json').then(function(r){return r.json()}).then(function(d){allData=d;populateC();render(d)}).catch(function(e){console.error(e)})}

function render(d){
    var o=d.outbreaks.slice();
    var q=document.getElementById('q').value;
    var c=document.getElementById('csel').value;
    if(q)o=o.filter(function(x){var hay=x.disease+' '+x.location+' '+x.country+' '+cn(x.country_iso3)+' '+dn(x.disease)+' '+(DN[x.disease]?Object.values(DN[x.disease]).join(' '):'')+' '+(x.description||'');return fuzzy(hay,q)});
    if(c){o=o.filter(function(x){return x.country_iso3===c});
        // Fly to country
        var pts=o.filter(function(x){return x.latitude&&x.longitude});
        if(pts.length>0){var lat=pts.reduce(function(s,x){return s+x.latitude},0)/pts.length;var lng=pts.reduce(function(s,x){return s+x.longitude},0)/pts.length;map.flyTo([lat,lng],5,{duration:1})}
    }else{map.flyTo([20,0],2,{duration:0.5})}
    o.sort(function(a,b){var s={very_high:0,high:1,moderate:2,low:3,unknown:4};return(s[a.severity]||9)-(s[b.severity]||9)||(b.cases||0)-(a.cases||0)});
    var tc=0,td=0;o.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});
    document.getElementById('stats').innerHTML='<div class="st"><div class="st-v">'+o.length+'</div><div class="st-l">'+i('active')+'</div></div><div class="st"><div class="st-v">'+fmt(tc||null)+'</div><div class="st-l">'+i('cases')+'</div></div><div class="st"><div class="st-v">'+fmt(td||null)+'</div><div class="st-l">'+i('deaths')+'</div></div><div class="st"><div class="st-v">'+pct(td,tc)+'</div><div class="st-l">'+i('cfr')+'</div></div><div class="st"><div class="st-v">'+new Set(o.map(function(x){return x.country_iso3})).size+'</div><div class="st-l">'+i('countries')+'</div></div>';
    renderMap(o);renderNews(d.outbreaks);renderList(o);
}

function renderMap(o){cl.clearLayers();o.forEach(function(x){if(!x.latitude&&!x.longitude)return;var c=SC[x.severity]||'#657786',r=Math.max(4,Math.min(18,Math.sqrt(x.cases||1)*1.1));var m=L.circleMarker([x.latitude,x.longitude],{radius:r,color:c,fillColor:c,fillOpacity:0.4,weight:1.5});m.bindPopup('<b>'+dn(x.disease)+'</b>'+(x.h2h_transmission?' <b style="color:#f4212e">H2H</b>':'')+'<br>📍 '+cn(x.country_iso3)+'<br>'+i('cases')+': <b>'+fmt(x.cases)+'</b> · '+i('deaths')+': <b>'+fmt(x.deaths)+'</b>'+(x.source_url?'<br><a href="'+x.source_url+'" target="_blank">WHO →</a>':''));cl.addLayer(m)})}

function renderNews(o){var top=o.filter(function(x){return x.description&&x.cases>0}).sort(function(a,b){return new Date(b.date_reported)-new Date(a.date_reported)}).slice(0,10);var h='';top.forEach(function(x){var txt=dn(x.disease)+' — '+cn(x.country_iso3)+': '+x.description.substring(0,80);h+='<div class="ni"><span class="dot">●</span>'+txt+(x.source_url?' <a href="'+x.source_url+'" target="_blank">→</a>':'')+'</div>'});document.getElementById('news').innerHTML=h+h}

function renderList(o){var h='';o.forEach(function(x){var cls=SL[x.severity]||'sl',bg=SB[x.severity]||'bl';var conf=x.confidence==='high'?'<span class="tg tv">'+i('v')+'</span>':x.confidence==='pending'?'<span class="tg tp">'+i('p')+'</span>':'';var h2h=x.h2h_transmission?'<span class="tg th">H2H</span>':'';var t=tip(x.disease);var tt=t?'<span class="tt">'+t+'</span>':'';var sl=x.severity==='very_high'?i('crit'):x.severity==='high'?i('high'):x.severity==='moderate'?i('mod'):i('low');h+='<div class="card '+cls+'" onclick="openM(\''+x.disease.replace(/'/g,"\\'")+'\')"><div class="card-hd"><span class="card-nm">'+dn(x.disease)+tt+'</span><span class="bge '+bg+'">'+sl+'</span></div><div class="card-loc">📍 '+cn(x.country_iso3)+'</div><div class="card-st"><span>'+i('cases')+': <b>'+fmt(x.cases)+'</b></span><span>'+i('deaths')+': <b>'+fmt(x.deaths)+'</b></span><span>CFR: '+pct(x.deaths,x.cases)+'</span></div><div class="card-tg">'+conf+h2h+(x.source_url?' <a href="'+x.source_url+'" target="_blank" onclick="event.stopPropagation()" style="font-size:10px">WHO→</a>':'')+'</div></div>'});document.getElementById('list').innerHTML=h}

function openM(disease){
    var items=allData.outbreaks.filter(function(x){return x.disease===disease});
    var tc=0,td=0;items.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});
    curPeriod=30;

    // Fly to disease cluster
    var pts=items.filter(function(x){return x.latitude&&x.longitude&&x.cases>0});
    if(pts.length>0){var lat=pts.reduce(function(s,x){return s+x.latitude},0)/pts.length;var lng=pts.reduce(function(s,x){return s+x.longitude},0)/pts.length;map.flyTo([lat,lng],4,{duration:1})}

    var t=tip(disease);
    var h='<button class="mcls" onclick="closeM()">&times;</button><h2>'+dn(disease)+'</h2>';
    if(t)h+='<p class="modal-desc">'+t+'</p>';
    h+='<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+items.length+' outbreaks · '+new Set(items.map(function(x){return x.country_iso3})).size+' '+i('countries')+'</div>';

    // Period summary
    var now=new Date();
    var p7=0,p30=0,p180=0;
    items.forEach(function(x){var d=(now-new Date(x.date_reported))/86400000;if(d<=7)p7+=x.cases||0;if(d<=30)p30+=x.cases||0;if(d<=180)p180+=x.cases||0});
    h+='<div class="msm"><div class="ms"><div class="ms-v" style="color:var(--red)">'+fmt(p7||null)+'</div><div class="ms-l">'+i('d7')+'</div></div><div class="ms"><div class="ms-v" style="color:var(--amber)">'+fmt(p30||null)+'</div><div class="ms-l">'+i('d30')+'</div></div><div class="ms"><div class="ms-v" style="color:var(--blue)">'+fmt(p180||null)+'</div><div class="ms-l">'+i('d180')+'</div></div></div>';

    // Period selector
    h+='<div class="period-btns"><button class="pbtn" onclick="setPeriod(7,\''+disease.replace(/'/g,"\\'")+'\')">'+i('d7')+'</button><button class="pbtn active" onclick="setPeriod(30,\''+disease.replace(/'/g,"\\'")+'\')">'+i('d30')+'</button><button class="pbtn" onclick="setPeriod(180,\''+disease.replace(/'/g,"\\'")+'\')">'+i('d180')+'</button></div>';
    h+='<div class="chart-box"><canvas id="dchart"></canvas></div>';
    h+='<div style="font-size:13px;color:var(--bright);font-weight:600">'+i('total')+': '+(tc>0?tc.toLocaleString():'—')+' '+i('cases')+' · '+(td>0?td.toLocaleString():'—')+' '+i('deaths')+' · CFR '+pct(td,tc)+'</div>';

    document.getElementById('mc').innerHTML=h;
    document.getElementById('mbg').classList.add('open');
    drawChart(disease,30);
}

function setPeriod(days,disease){
    curPeriod=days;
    document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active')});
    event.target.classList.add('active');
    drawChart(disease,days);
}

function drawChart(disease,days){
    var items=allData.outbreaks.filter(function(x){return x.disease===disease});
    var now=new Date();
    var buckets,labels;

    if(days<=7){
        buckets=new Array(7).fill(0);labels=[];
        for(var d=6;d>=0;d--){var dt=new Date(now-d*86400000);labels.push((dt.getMonth()+1)+'/'+dt.getDate())}
        items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<7)buckets[6-diff]+=x.cases||0});
    }else if(days<=30){
        buckets=new Array(30).fill(0);labels=[];
        for(var d=29;d>=0;d--){var dt=new Date(now-d*86400000);labels.push(d%5===0?(dt.getMonth()+1)+'/'+dt.getDate():'')}
        items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<30)buckets[29-diff]+=x.cases||0});
    }else{
        buckets=new Array(6).fill(0);labels=[];
        for(var m=5;m>=0;m--){var dt=new Date(now.getFullYear(),now.getMonth()-m,1);labels.push(dt.getFullYear()+'/'+(dt.getMonth()+1))}
        items.forEach(function(x){var dt=new Date(x.date_reported);var diff=Math.floor((now-dt)/86400000/30);if(diff>=0&&diff<6)buckets[5-diff]+=x.cases||0});
    }

    var ctx=document.getElementById('dchart');
    if(!ctx)return;
    if(myChart)myChart.destroy();
    myChart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:i('cases'),data:buckets,borderColor:'#1d9bf0',backgroundColor:'rgba(29,155,240,0.08)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#1d9bf0',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8899a6',font:{size:11}}}},scales:{x:{title:{display:true,text:days<=30?'Date':'Month',color:'#8899a6'},grid:{color:'rgba(56,68,77,0.4)'},ticks:{color:'#8899a6',maxRotation:0,autoSkip:true,maxTicksLimit:8}},y:{title:{display:true,text:i('cases'),color:'#8899a6'},grid:{color:'rgba(56,68,77,0.4)'},ticks:{color:'#8899a6'},beginAtZero:true}}}});
}

function closeM(){document.getElementById('mbg').classList.remove('open');if(myChart){myChart.destroy();myChart=null}}
window.addEventListener('load',init);
</script>
</body>
