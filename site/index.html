<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Epidemic Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
:root{--bg:#0f1318;--panel:#161b22;--card:#1c2230;--border:#2a3142;--text:#8b95a8;--bright:#e2e8f4;--muted:#505a6e;--green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--cyan:#67e8f9;--font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;--mono:'SF Mono','Consolas','Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:0.6rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
.hdr-l{display:flex;align-items:center;gap:0.6rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(52,211,153,0.5);animation:p 2.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.4}}
.hdr h1{font-size:0.95rem;font-weight:600;color:var(--bright)}
.hdr-r{display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap}
.sel{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:0.25rem 0.5rem;border-radius:5px;font-size:0.8rem;font-family:var(--font);cursor:pointer}
.sel:focus{outline:none;border-color:var(--cyan)}
.meta{font-size:0.75rem;color:var(--muted)}.meta b{color:var(--cyan);font-family:var(--mono);font-weight:500}
.motto{background:linear-gradient(90deg,#b91c1c,#dc2626,#b91c1c);text-align:center;padding:0.3rem;font-size:0.8rem;font-weight:600;letter-spacing:0.08em;color:white}
.ticker-bar{background:var(--panel);border-bottom:1px solid var(--border);overflow:hidden;white-space:nowrap;height:2rem;display:flex;align-items:center}
.ticker-lbl{background:var(--red);color:white;padding:0 0.7rem;font-size:0.7rem;font-weight:700;height:100%;display:flex;align-items:center;flex-shrink:0;z-index:2;letter-spacing:0.04em}
.ticker{display:flex;animation:tk 150s linear infinite;padding-left:1rem}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:0.3rem;margin-right:2rem;font-size:0.8rem;color:var(--text);flex-shrink:0}
.ti-dot{color:var(--red);font-size:0.45rem}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border)}
.st{background:var(--panel);padding:0.6rem 0.8rem;text-align:center}
.st-v{font-size:1.4rem;font-weight:700;line-height:1.2;font-family:var(--mono)}
.st-l{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-top:0.1rem}
.st.d .st-v{color:var(--red)}.st.w .st-v{color:var(--amber)}.st.i .st-v{color:var(--blue)}.st.g .st-v{color:var(--green)}.st.p .st-v{color:var(--purple)}.st.c .st-v{color:var(--cyan)}
.main{display:grid;grid-template-columns:340px 1fr 340px;height:calc(100vh - 9rem);min-height:400px}
.left{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.left-body{flex:1;overflow-y:auto;padding:0.5rem}
.left-body::-webkit-scrollbar{width:4px}.left-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.map-wrap{position:relative;background:var(--bg)}
#map{width:100%;height:100%}
.leaflet-container{background:var(--bg)!important}
.leaflet-tile-pane{filter:saturate(0.35) brightness(0.5) contrast(1.15)}
.leaflet-popup-content-wrapper{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:var(--font)}
.leaflet-popup-tip{background:var(--card)}
.leaflet-popup-content{font-size:0.85rem;line-height:1.6}
.leaflet-popup-content strong{color:var(--bright)}
.leaflet-popup-content a{color:var(--cyan)}
.right{background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rtab{flex:1;padding:0.5rem;text-align:center;font-size:0.72rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.03em}
.rtab:hover{color:var(--text)}.rtab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.right-body{flex:1;overflow-y:auto;padding:0.5rem}
.right-body::-webkit-scrollbar{width:4px}.right-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.rpane{display:none}.rpane.active{display:block}
.alert{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem;margin-bottom:0.5rem;border-left:3px solid var(--red)}
.alert-title{font-size:0.78rem;font-weight:600;color:var(--red);margin-bottom:0.2rem;display:flex;align-items:center;gap:0.3rem}
.alert-text{font-size:0.75rem;color:var(--text);line-height:1.5}
.alert.amber{border-left-color:var(--amber)}.alert.amber .alert-title{color:var(--amber)}
.risk-panel{background:linear-gradient(135deg,rgba(248,113,113,0.08),rgba(251,191,36,0.05));border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:0.8rem;margin-bottom:0.6rem}
.risk-panel-title{font-size:0.85rem;font-weight:700;color:var(--red);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}
.risk-item{display:flex;align-items:flex-start;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid rgba(248,113,113,0.1);font-size:0.78rem}
.risk-item:last-child{border-bottom:none}
.risk-icon{width:1.6rem;height:1.6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0}
.risk-critical-icon{background:rgba(248,113,113,0.2);color:var(--red)}
.risk-high-icon{background:rgba(251,191,36,0.15);color:var(--amber)}
.risk-info{flex:1}
.risk-name{color:var(--bright);font-weight:600}
.risk-detail{color:var(--text);font-size:0.72rem;margin-top:0.1rem}
.risk-action{color:var(--amber);font-size:0.7rem;margin-top:0.15rem;font-style:italic}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem;margin-bottom:0.5rem}
.lcard-title{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.3rem}
.lcard-val{font-size:1.3rem;font-weight:700;color:var(--bright);font-family:var(--mono)}
.lcard-sub{font-size:0.7rem;color:var(--text);margin-top:0.15rem}
.top5-item{display:flex;align-items:flex-start;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid rgba(42,49,66,0.3);font-size:0.78rem}
.top5-item:last-child{border-bottom:none}
.top5-rank{width:1.4rem;height:1.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0}
.rank-1{background:rgba(248,113,113,0.2);color:var(--red)}.rank-2{background:rgba(251,191,36,0.15);color:var(--amber)}.rank-3{background:rgba(96,165,250,0.12);color:var(--blue)}.rank-4,.rank-5{background:rgba(255,255,255,0.04);color:var(--muted)}
.top5-info{flex:1}.top5-name{color:var(--bright);font-weight:600}.top5-loc{color:var(--muted);font-size:0.72rem}
.oc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem;margin-bottom:0.4rem;cursor:pointer;transition:all 0.15s;border-left:3px solid transparent}
.oc:hover{border-color:var(--cyan);transform:translateX(2px)}
.oc.critical{border-left-color:var(--red)}.oc.high{border-left-color:var(--amber)}.oc.moderate{border-left-color:var(--blue)}.oc.low{border-left-color:var(--green)}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem}
.oc-name{font-size:0.82rem;font-weight:600;color:var(--bright)}
.oc-sev{font-size:0.6rem;padding:2px 6px;border-radius:4px;font-weight:600}
.sev-critical{background:rgba(248,113,113,0.15);color:var(--red)}.sev-high{background:rgba(251,191,36,0.15);color:var(--amber)}.sev-moderate{background:rgba(96,165,250,0.15);color:var(--blue)}.sev-low{background:rgba(52,211,153,0.15);color:var(--green)}
.oc-loc{font-size:0.75rem;color:var(--muted);margin-bottom:0.25rem}
.oc-nums{display:flex;gap:0.8rem;font-size:0.78rem;color:var(--text);margin-bottom:0.25rem}
.oc-nums .n{color:var(--bright);font-weight:600}
.oc-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:0.25rem;overflow:hidden}
.oc-bar-fill{height:100%;border-radius:2px}
.oc-tags{display:flex;gap:0.3rem;flex-wrap:wrap;align-items:center}
.tag{font-size:0.6rem;padding:2px 5px;border-radius:3px}
.tag-v{background:rgba(52,211,153,0.1);color:var(--green)}.tag-u{background:rgba(255,255,255,0.04);color:var(--muted)}.tag-h{background:rgba(248,113,113,0.12);color:var(--red)}
.dt{width:100%;font-size:0.78rem;border-collapse:collapse}
.dt th{color:var(--muted);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.04em;padding:0.3rem;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel)}
.dt td{padding:0.3rem;border-bottom:1px solid rgba(42,49,66,0.5)}
.dt tr:hover{background:rgba(103,232,249,0.03)}
.dt .dn{color:var(--bright);font-weight:600}.dt .dh{color:var(--red)}
.ftr{background:var(--panel);border-top:1px solid var(--border);padding:0.4rem 1rem;font-size:0.7rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:0.3rem}
@media(max-width:1100px){.main{grid-template-columns:1fr;grid-template-rows:auto 50vh auto;height:auto}.left{border-right:none;border-bottom:1px solid var(--border)}.right{border-left:none;border-top:1px solid var(--border)}.stats{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

function dn(n){return(L==='en'||!DIS[n])?n:(DIS[n][L]||n)}

async function init(){map=L.map('map',{zoomControl:false,attributionControl:false}).setView([20,0],2);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);L.control.zoom({position:'bottomright'}).addTo(map);cl=L.markerClusterGroup({maxClusterRadius:45,showCoverageOnHover:false,iconCreateFunction:function(c){const n=c.getChildCount();const r=n<5?20:n<15?28:n<50?36:44;return L.divIcon({html:'<div style="width:'+r+'px;height:'+r+'px;border-radius:50%;background:rgba(248,113,113,0.18);border:2px solid rgba(248,113,113,0.4);display:flex;align-items:center;justify-content:center;color:#f87171;font-weight:700;font-size:'+(r<28?10:12)+'px">'+n+'</div>',className:'',iconSize:[r,r]})}});map.addLayer(cl);await load();setInterval(load,600000);clock();setInterval(clock,1000);document.querySelectorAll('.rtab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.rpane').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById('p-'+tab.dataset.p).classList.add('active')})})}

async function load(){try{const r=await fetch('data/epidemics.json');if(!r.ok)throw new Error('HTTP '+r.status);all=await r.json();if(!all.outbreaks||!all.summary)throw new Error('Invalid data');renderAll(all)}catch(e){console.error('Load error:',e);document.getElementById('clock').textContent='ERR: '+e.message}}
function renderAll(d){const s=d.summary,o=d.outbreaks,dis=d.diseases;document.getElementById('src').textContent=(s.data_sources||[]).join(' · ').toUpperCase();document.getElementById('stats').innerHTML='<div class="st d"><div class="st-v">'+s.total_active_outbreaks+'</div><div class="st-l">'+i('active')+'</div></div><div class="st w"><div class="st-v">'+fmt(s.total_cases)+'</div><div class="st-l">'+i('cases')+'</div></div><div class="st i"><div class="st-v">'+fmt(s.total_deaths)+'</div><div class="st-l">'+i('deaths')+'</div></div><div class="st p"><div class="st-v">'+(s.global_cfr*100).toFixed(1)+'%</div><div class="st-l">'+i('cfr')+'</div></div><div class="st g"><div class="st-v">'+s.countries_affected+'</div><div class="st-l">'+i('countries')+'</div></div><div class="st c"><div class="st-v">'+s.diseases_tracked.length+'</div><div class="st-l">'+i('diseases')+'</div></div>';renderMap(o);renderTicker(o);renderLeft(o,dis);renderOutbreaks(o);renderDiseases(dis)}
function renderMap(outbreaks){cl.clearLayers();outbreaks.forEach(o=>{if(!o.latitude&&!o.longitude)return;const c=SC[o.severity]||'#505a6e',r=Math.max(5,Math.min(18,Math.sqrt(o.cases||1)*1.2));const m=L.circleMarker([o.latitude,o.longitude],{radius:r,color:c,fillColor:c,fillOpacity:0.4,weight:1.5});const v=o.news_verified?'<span style="color:#34d399">✓ '+i('v')+'</span>':'<span style="color:#505a6e">? '+i('u')+'</span>';const h=o.h2h_transmission?'<span style="color:#f87171"> ⚠ H2H</span>':'';m.bindPopup('<strong>'+dn(o.disease)+'</strong>'+h+'<br>📍 '+o.location+', '+o.country+'<br>'+i('cases')+': <strong>'+(o.cases||0).toLocaleString()+'</strong> · '+i('deaths')+': <strong>'+(o.deaths||0).toLocaleString()+'</strong><br>CFR: '+pct(o.deaths,o.cases)+' · '+i('sev')+': '+sl(o.severity)+'<br>'+v+(o.source_url?'<br><a href="'+o.source_url+'" target="_blank">WHO DON →</a>':''));cl.addLayer(m)})}
function renderTicker(outbreaks){const top=outbreaks.filter(o=>o.cases>0).sort((a,b)=>b.cases-a.cases).slice(0,12);let h='';top.forEach(o=>{h+='<span class="ti"><span class="ti-dot">●</span>'+dn(o.disease)+(o.h2h_transmission?' [H2H]':'')+' — '+o.location+': '+fmt(o.cases)+' '+i('cases_word')+', '+fmt(o.deaths)+' '+i('deaths_word')+'</span>'});document.getElementById('tk').innerHTML=h+h}

)+' '+new Set(high.map(o=>o.country)).size+' '+i('countries').toLowerCase()+'</div></div>'}h+='<div class="lcard"><div class="lcard-title">🔴 '+i('top5')+'</div>';danger.forEach((o,idx)=>{const rc=idx===0?'rank-1':idx===1?'rank-2':idx===2?'rank-3':'rank-4';h+='<div class="top5-item"><div class="top5-rank '+rc+'">'+(idx+1)+'</div><div class="top5-info"><div class="top5-name">'+dn(o.disease)+(o.h2h_transmission?' <span style="color:var(--red)">H2H</span>':'')+'</div><div class="top5-loc">📍 '+o.location+', '+o.country+' · '+fmt(o.cases)+' '+i('cases_word')+' · CFR '+pct(o.deaths,o.cases)+'</div></div></div>'});h+='</div>';const regions={};outbreaks.forEach(o=>{const lat=o.latitude||0,r=lat>50?'Europe & Central Asia':lat>20?'Middle East & South Asia':lat>-10?'Sub-Saharan Africa':'Americas';if(!regions[r])regions[r]={cases:0,countries:new Set()};regions[r].cases+=o.cases||0;regions[r].countries.add(o.country)});h+='<div class="lcard"><div class="lcard-title">🌍 '+i('geo')+'</div>';for(const[r,d]of Object.entries(regions).sort((a,b)=>b[1].cases-a[1].cases)){h+='<div style="display:flex;justify-content:space-between;padding:0.2rem 0;font-size:0.75rem;border-bottom:1px solid rgba(42,49,66,0.3)"><span>'+r+'</span><span style="color:var(--bright)">'+fmt(d.cases)+' '+i('cases_word')+' · '+d.countries.size+' '+i('countries').toLowerCase()+'</span></div>'}h+='</div>';const rate=outbreaks.length>0?Math.round(ver.length/outbreaks.length*100):0;h+='<div class="lcard"><div class="lcard-title">✓ '+i('ver_rate')+'</div><div class="lcard-val">'+rate+'%</div><div class="lcard-sub">'+ver.length+'/'+outbreaks.length+' '+i('ob').toLowerCase()+'</div></div>';const sevCount={};outbreaks.forEach(o=>{const s=o.severity||'unknown';if(!sevCount[s])sevCount[s]=0;sevCount[s]++});h+='<div class="lcard"><div class="lcard-title">'+i('by_sev')+'</div>';for(const[s,c]of Object.entries(sevCount).sort((a,b)=>b[1]-a[1])){h+='<div style="display:flex;align-items:center;gap:0.4rem;padding:0.15rem 0;font-size:0.75rem"><span style="width:8px;height:8px;border-radius:50%;background:'+(SC[s]||'#505a6e')+';flex-shrink:0"></span><span>'+sl(s)+'</span><span style="margin-left:auto;color:var(--bright);font-weight:600">'+c+'</span></div>'}h+='</div>';document.getElementById('left').innerHTML=h}
function renderOutbreaks(outbreaks){const sorted=[...outbreaks].sort((a,b)=>{const s={very_high:0,high:1,moderate:2,low:3,unknown:4};return(s[a.severity]||9)-(s[b.severity]||9)||(b.cases||0)-(a.cases||0)});const maxC=Math.max(...outbreaks.map(o=>o.cases||0),1);let h='';sorted.forEach(o=>{const cls=SK[o.severity]||'low',sc='sev-'+cls;const v=o.news_verified?'<span class="tag tag-v">✓</span>':'<span class="tag tag-u">?</span>';const h2h=o.h2h_transmission?'<span class="tag tag-h">H2H</span>':'';const barW=Math.max(2,Math.min(100,((o.cases||0)/maxC)*100));h+='<div class="oc '+cls+'" onclick="fly('+o.latitude+','+o.longitude+')"><div class="oc-top"><span class="oc-name">'+dn(o.disease)+'</span><span class="oc-sev '+sc+'">'+sl(o.severity)+'</span></div><div class="oc-loc">📍 '+o.location+', '+o.country+'</div><div class="oc-nums"><span>'+i('cases')+': <span class="n">'+(o.cases||0).toLocaleString()+'</span></span><span>'+i('deaths')+': <span class="n">'+(o.deaths||0).toLocaleString()+'</span></span><span>CFR: '+pct(o.deaths,o.cases)+'</span></div><div class="oc-bar"><div class="oc-bar-fill" style="width:'+barW+'%;background:'+(SC[o.severity]||'#505a6e')+'"></div></div><div class="oc-tags">'+v+' '+h2h+(o.source_url?' <a href="'+o.source_url+'" target="_blank" style="color:#67e8f9;font-size:0.6rem">WHO →</a>':'')+'</div></div>'});document.getElementById('p-out').innerHTML=h}
function renderDiseases(diseases){let h='<table class="dt"><thead><tr><th>'+i('d')+'</th><th>'+i('cases')+'</th><th>'+i('deaths')+'</th><th>'+i('cf')+'</th><th>'+i('ob')+'</th><th>H2H</th></tr></thead><tbody>';for(const[n,d]of Object.entries(diseases)){h+='<tr><td class="dn">'+dn(n)+'</td><td>'+fmt(d.cases)+'</td><td>'+fmt(d.deaths)+'</td><td>'+(d.cfr*100).toFixed(1)+'%</td><td>'+d.outbreaks+'</td><td>'+(d.h2h_transmission?'<span class="dh">⚠</span>':'-')+'</td></tr>'}h+='</tbody></table>';document.getElementById('p-dis').innerHTML=h}
function fly(lat,lng){if(lat&&lng)map.flyTo([lat,lng],6,{duration:1})}
init();
</script>
