<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0b1120;--panel:#131c2e;--card:#1a2540;--border:#253050;--text:#7b8ba3;--bright:#e8ecf2;--muted:#506078;--accent:#00d4aa;--accent2:#00b4d8;--red:#ff4757;--amber:#ffa502;--green:#2ed573;--purple:#a55eea}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px}
a{color:var(--accent2);text-decoration:none}
.top{background:linear-gradient(90deg,#ff4757,#ff6b81);color:white;text-align:center;padding:5px;font-size:11px;font-weight:700}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:15px;font-weight:700;color:var(--accent)}.hdr h1 span{color:var(--bright)}
.sel{background:var(--card);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer}.sel:focus{outline:none;border-color:var(--accent)}
.news{background:var(--panel);border-bottom:1px solid var(--border);height:30px;overflow:hidden;display:flex;align-items:center;cursor:pointer}
.nlbl{background:var(--red);color:white;padding:0 10px;font-size:10px;font-weight:700;height:100%;display:flex;align-items:center;flex-shrink:0}
.nwrap{flex:1;height:100%;overflow:hidden;position:relative}
.ninner{position:absolute;width:100%;animation:ns 8s linear infinite}
@keyframes ns{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
.ni{height:30px;line-height:30px;padding:0 14px;font-size:12px;white-space:nowrap;overflow:hidden}
.ni .d{color:var(--red);margin-right:8px}
.bar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:10px;align-items:center}
.ms{position:relative;min-width:160px}
.mb{background:var(--card);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;width:100%;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb:hover{border-color:var(--accent)}.mb.hv{color:var(--accent);border-color:var(--accent)}
.md{display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;max-height:250px;overflow-y:auto;z-index:200}.md.op{display:block}
.md input{width:100%;padding:6px 8px;background:var(--bg);border:none;border-bottom:1px solid var(--border);color:var(--bright);font-size:12px;font-family:inherit;outline:none}
.md .o{padding:5px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(37,48,80,0.3)}.md .o:hover{background:var(--border)}.md .o.sl{color:var(--accent)}
.md .o .c{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.md .o.sl .c{background:var(--accent);border-color:var(--accent)}
.rb{background:transparent;color:var(--muted);border:1px solid var(--border);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}.rb:hover{color:var(--red);border-color:var(--red)}
.st{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border)}
.si{background:var(--panel);padding:10px 8px;text-align:center;border-right:1px solid var(--border)}.si:last-child{border-right:none}
.sv{font-size:20px;font-weight:700}.sl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.si:nth-child(1) .sv{color:var(--red)}.si:nth-child(2) .sv{color:var(--amber)}.si:nth-child(3) .sv{color:var(--accent2)}.si:nth-child(4) .sv{color:var(--purple)}.si:nth-child(5) .sv{color:var(--green)}
.main{display:grid;grid-template-columns:1fr 350px;height:calc(100vh - 200px)}#map{width:100%;height:100%}.leaflet-container{background:var(--bg)!important}
.side{border-left:1px solid var(--border);overflow-y:auto;background:var(--panel);padding:6px}.side::-webkit-scrollbar{width:4px}.side::-webkit-scrollbar-thumb{background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:5px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s}
.card:hover{transform:translateX(2px);border-color:var(--accent);box-shadow:0 2px 12px rgba(0,212,170,0.08)}
.card.c1{border-left-color:var(--red)}.card.c2{border-left-color:var(--amber)}.card.c3{border-left-color:var(--accent2)}.card.c4{border-left-color:var(--green)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cn{font-size:13px;font-weight:600;color:var(--bright);position:relative;cursor:help}.cn:hover .tp{display:block}
.tp{display:none;position:absolute;top:100%;left:0;background:var(--bg);border:1px solid var(--accent);border-radius:8px;padding:10px;font-size:11px;font-weight:400;color:var(--text);width:260px;z-index:50;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.bg{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.b1{background:rgba(255,71,87,0.15);color:var(--red)}.b2{background:rgba(255,165,2,0.15);color:var(--amber)}.b3{background:rgba(0,180,216,0.15);color:var(--accent2)}.b4{background:rgba(46,213,115,0.15);color:var(--green)}
.ci{font-size:11px;color:var(--muted);margin-bottom:3px}
.cn2{display:flex;gap:10px;font-size:12px}.cn2 b{color:var(--bright)}
.ct{display:flex;gap:4px;margin-top:4px;font-size:10px}.tg{padding:2px 5px;border-radius:3px}.th{background:rgba(255,71,87,0.12);color:var(--red)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}.mbg.op{display:flex}
.mod{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:92%;max-width:650px;max-height:85vh;overflow-y:auto;padding:24px;position:relative}
.mod h2{color:var(--accent);font-size:18px;margin-bottom:8px}
.mcl{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer}
.pb{display:flex;gap:8px;margin:12px 0}
.pbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s}.pbtn:hover{border-color:var(--accent)}
.pbtn.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;height:280px;margin-bottom:14px}
.ftr{background:var(--panel);border-top:1px solid var(--border);padding:6px;font-size:10px;color:var(--muted);text-align:center}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto}#map{height:40vh}}
</style></head><body>
<div class="top">CDC is dead, we protect the people. — El pueblo unido jamás será vencido</div>
<div class="hdr"><h1>🌍 <span>GLOBAL EPIDEMIC TRACKER</span></h1><div style="display:flex;gap:8px"><select class="sel" id="lang" onchange="setLang(this.value)"><option value="zh" selected>中文</option><option value="en">English</option><option value="ru">Русский</option><option value="es">Español</option></select></div></div>

<div class="st" id="stats"></div>
<div class="main"><div id="map"></div><div class="side" id="side"></div></div>
<div class="ftr">DATA: WHO DON · WHO GHO · OWID | CROSS-VALIDATION: Bing · Google · Reddit</div>
<div class="mbg" id="nbg" onclick="if(event.target===this)this.classList.remove('op')"><div class="mod"><button class="mcl" onclick="cloN()">&times;</button><h2 id="nt">Breaking News</h2><div id="na" style="max-height:60vh;overflow-y:auto"></div></div></div>
<div class="mbg" id="dbg" onclick="if(event.target===this)this.classList.remove('op')"><div class="mod" id="dm"></div></div>

<script>

var DN={Cholera:{zh:"霍乱"},Dengue:{zh:"登革热"},Measles:{zh:"麻疹"},Hantavirus:{zh:"汉坦病毒"},Mpox:{zh:"猴痘"},"Yellow Fever":{zh:"黄热病"},Diphtheria:{zh:"白喉"},Influenza:{zh:"流感"},"Lassa Fever":{zh:"拉沙热"},"Nipah Virus Infection":{zh:"尼帕病毒"},"Marburg Virus Disease":{zh:"马尔堡"},"Ebola Virus Disease":{zh:"埃博拉"},Poliomyelitis:{zh:"脊髓灰质炎"},Chikungunya:{zh:"基孔肯雅"},"Chikungunya virus disease":{zh:"基孔肯雅"},Malaria:{zh:"疟疾"},"Avian Influenza":{zh:"禽流感"},COVID:{zh:"新冠"},SARS:{zh:"非典"},Plague:{zh:"鼠疫"},Anthrax:{zh:"炭疽"},Rabies:{zh:"狂犬病"},"Rift Valley Fever":{zh:"裂谷热"},"West Nile Virus":{zh:"西尼罗病毒"},"Crimean-Congo Hemorrhagic Fever":{zh:"克里米亚出血热"},"Hepatitis E":{zh:"戊型肝炎"},Legionellosis:{zh:"军团菌病"},"Zika virus disease":{zh:"寨卡"},"Typhoid fever":{zh:"伤寒"},"Novel coronavirus infection":{zh:"新冠"},"Oropouche Virus Disease":{zh:"奥罗普切"},"Sudan Virus Disease":{zh:"苏丹病毒"},"Meningococcal Meningitis":{zh:"脑膜炎"},"Acute Unknown Illness":{zh:"急性未知疾病"},"Japanese Encephalitis":{zh:"日本脑炎"},Rubella:{zh:"风疹"},Mumps:{zh:"腮腾炎"},"Neonatal Tetanus":{zh:"新生儿破伤风"},MERS:{zh:"中东呼吸综合征"},"Middle East respiratory syndrome coronavirus":{zh:"中东呼吸综合征"},"Middle East Respiratory Syndrome Coronavirus":{zh:"中东呼吸综合征"}};

function filD(t,q){var o=document.getElementById(t==="c"?"copts":"dopts").children;q=q.toLowerCase();for(var j=0;j<o.length;j++){var tx=o[j].textContent.toLowerCase();o[j].style.display=tx.indexOf(q)>=0?"":"none"}}
function popD(){if(!allData)return;var co={},di={};allData.outbreaks.forEach(function(x){if(x.country_iso3)co[x.country_iso3]=1;di[x.disease]=1});var ch="";Object.keys(co).sort(function(a,b){return cn(a).localeCompare(cn(b))}).forEach(function(iso){ch+='<div class="o'+(sC.has(iso)?" sl":"")+'" onclick="tSC(\''+iso+'\')"><span class="c"></span>'+cn(iso)+'</div>'});document.getElementById("copts").innerHTML=ch;var dh="";Object.keys(di).sort(function(a,b){return dn(a).localeCompare(dn(b))}).forEach(function(d){dh+='<div class="o'+(sD.has(d)?" sl":"")+'" onclick="tSD(\''+d.replace(/'/g,"\\'")+'\')"><span class="c"></span>'+dn(d)+'</div>'});document.getElementById("dopts").innerHTML=dh;uB()}
function tSC(iso){sC.has(iso)?sC.delete(iso):sC.add(iso);popD();doF()}
function tSD(d){sD.has(d)?sD.delete(d):sD.add(d);popD();doF()}
function uB(){var cb=document.getElementById("cbtn"),db=document.getElementById("dbtn");if(sC.size===0){cb.textContent=i("alc");cb.classList.remove("hv")}else if(sC.size===1){cb.textContent=cn(Array.from(sC)[0]);cb.classList.add("hv")}else{cb.textContent=sC.size+" "+i("co");cb.classList.add("hv")}if(sD.size===0){db.textContent=i("ald");db.classList.remove("hv")}else if(sD.size===1){db.textContent=dn(Array.from(sD)[0]);db.classList.add("hv")}else{db.textContent=sD.size+" "+i("ald");db.classList.add("hv")}}
function doF(){closD();if(allData)render(allData)}
function init(){map=L.map("map",{zoomControl:true,attributionControl:false}).setView([20,0],2);L.tileLayer("https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);cl=L.markerClusterGroup({maxClusterRadius:50,showCoverageOnHover:false,iconCreateFunction:function(c){var n=c.getChildCount(),r=n<5?18:n<15?26:n<50?34:42;return L.divIcon({html:'<div style="width:'+r+'px;height:'+r+'px;border-radius:50%;background:rgba(0,212,170,0.2);border:2px solid rgba(0,212,170,0.5);display:flex;align-items:center;justify-content:center;color:#00d4aa;font-weight:700;font-size:'+(r<26?10:12)+'px">'+n+'</div>',className:"",iconSize:[r,r]})}});map.addLayer(cl);ld();setInterval(ld,600000);window.addEventListener("resize",function(){map.invalidateSize()});document.addEventListener("click",function(e){if(!e.target.closest(".ms"))closD()})}
function ld(){fetch("data/epidemics.json?t="+Date.now()).then(function(r){return r.json()}).then(function(d){allData=d;popD();render(d)}).catch(function(e){console.error(e)})}
function render(d){var o=d.outbreaks.slice();if(sC.size>0)o=o.filter(function(x){return sC.has(x.country_iso3)});if(sD.size>0)o=o.filter(function(x){return sD.has(x.disease)});if(sC.size>0||sD.size>0){var pts=o.filter(function(x){return x.latitude});if(pts.length){var lt=pts.reduce(function(s,x){return s+x.latitude},0)/pts.length;var ln=pts.reduce(function(s,x){return s+x.longitude},0)/pts.length;map.flyTo([lt,ln],sD.size===1?3:5,{duration:1})}}var tc=0,td=0;o.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});document.getElementById("stats").innerHTML='<div class="si"><div class="sv">'+o.length+'</div><div class="sl">'+i("ac")+'</div></div><div class="si"><div class="sv">'+fmt(tc||null)+'</div><div class="sl">'+i("ca")+'</div></div><div class="si"><div class="sv">'+fmt(td||null)+'</div><div class="sl">'+i("de")+'</div></div><div class="si"><div class="sv">'+pct(td,tc)+'</div><div class="sl">'+i("cf")+'</div></div><div class="si"><div class="sv">'+new Set(o.map(function(x){return x.country_iso3})).size+'</div><div class="sl">'+i("co")+'</div></div>';rM(o);rN(d.outbreaks);rS(o)}
function rM(o){cl.clearLayers();o.forEach(function(x){if(!x.latitude)return;var c=SC[x.severity]||"#506078",r=Math.max(4,Math.min(18,Math.sqrt(x.cases||1)*1.1));var m=L.circleMarker([x.latitude,x.longitude],{radius:r,color:c,fillColor:c,fillOpacity:0.4,weight:1.5});m.bindPopup("<b>"+dn(x.disease)+"</b>"+(x.h2h_transmission?" <b style='color:#ff4757'>H2H</b>":"")+"<br>\ud83d\udccd "+cn(x.country_iso3)+"<br>"+i("ca")+": <b>"+fmt(x.cases)+"</b> \xb7 "+i("de")+": <b>"+fmt(x.deaths)+"</b>"+(x.source_url?"<br><a href='"+x.source_url+"' target='_blank'>WHO \u2192</a>":""));cl.addLayer(m)})}
function rN(o){var top=o.filter(function(x){return x.description&&x.cases>0}).sort(function(a,b){return new Date(b.date_reported)-new Date(a.date_reported)}).slice(0,12);var h="";top.forEach(function(x){h+='<div class="ni"><span class="d">\u25cf</span>'+dn(x.disease)+" \u2014 "+cn(x.country_iso3)+": "+(x.description||"").substring(0,55)+"</div>"});document.getElementById("nlist").innerHTML=h+h}
function rS(o){
    var g={};
    o.forEach(function(x){
        var k=x.disease;
        if(!g[k])g[k]={disease:k,cases:0,deaths:0,severity:"low",h2h:false,countries:new Set()};
        var d=g[k];
        d.cases+=x.cases||0;d.deaths+=x.deaths||0;
        d.countries.add(x.country_iso3);
        if(x.h2h_transmission)d.h2h=true;
        if((SO[x.severity]||9)<(SO[d.severity]||9))d.severity=x.severity;
    });
    var list=Object.values(g).sort(function(a,b){return(SO[a.severity]||9)-(SO[b.severity]||9)});
    var h="";
    list.forEach(function(x){
        var cls=x.severity==="very_high"?"c1":x.severity==="high"?"c2":x.severity==="moderate"?"c3":"c4";
        var bg=x.severity==="very_high"?"b1":x.severity==="high"?"b2":x.severity==="moderate"?"b3":"b4";
        var tip=tp(x.disease);
        var tt=tip?`<span class="tp">${tip}</span>`:"";
        var h2h=x.h2h?`<span class="tg th">H2H</span>`:"";
        h+=`<div class="card ${cls}" data-d="${x.disease}" onclick="opD(this.dataset.d)">`;
        h+=`<div class="ch"><span class="cn">${dn(x.disease)}${tt}</span><span class="bg ${bg}">${sL(x.severity)}</span></div>`;
        h+=`<div class="ci">${x.countries.size} ${i("co")}</div>`;
        h+=`<div class="cn2"><span>${i("ca")}: <b>${fmt(x.cases)}</b></span><span>${i("de")}: <b>${fmt(x.deaths)}</b></span><span>CFR: ${pct(x.deaths,x.cases)}</span></div>`;
        h+=`<div class="ct">${h2h}</div></div>`;
    });
    document.getElementById("side").innerHTML=h;
}

function opD(disease){sD.clear();sD.add(disease);popD();doF();var items=allData.outbreaks.filter(function(x){return x.disease===disease});var tc=0,td=0;items.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});var tip=tp(disease);var now=new Date();var p7=0,p30=0,p180=0;items.forEach(function(x){var d=(now-new Date(x.date_reported))/86400000;if(d<=7)p7+=x.cases||0;if(d<=30)p30+=x.cases||0;if(d<=180)p180+=x.cases||0});var h='<button class="mcl" onclick="cloD()">&times;</button>';h+="<h2>"+dn(disease)+"</h2>";if(tip)h+='<p style="font-size:12px;color:var(--text);margin-bottom:10px">'+tip+"</p>";h+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+items.length+" outbreaks \xb7 "+new Set(items.map(function(x){return x.country_iso3})).size+" "+i("co")+"</div>";h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">';h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--red)">'+fmt(p7||null)+'</div><div style="font-size:10px;color:var(--muted)">'+i("d7")+"</div></div>";h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--amber)">'+fmt(p30||null)+'</div><div style="font-size:10px;color:var(--muted)">'+i("d3")+"</div></div>";h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--accent2)">'+fmt(p180||null)+'</div><div style="font-size:10px;color:var(--muted)">'+i("d6")+"</div></div></div>";h+='<div class="pb"><button class="pbtn" onclick="dC(\''+disease.replace(/'/g,"\\'")+"',7)\">"+i("d7")+'</button><button class="pbtn on" onclick="dC(\''+disease.replace(/'/g,"\\'")+"',30)\">"+i("d3")+'</button><button class="pbtn" onclick="dC(\''+disease.replace(/'/g,"\\'")+"',180)\">"+i("d6")+"</button></div>";h+='<div class="cbox"><canvas id="dc"></canvas></div>';h+='<div style="font-size:13px;color:var(--bright);font-weight:600">'+i("to")+": "+(tc?tc.toLocaleString():"\u2014")+" "+i("ca")+" \xb7 "+(td?td.toLocaleString():"\u2014")+" "+i("de")+" \xb7 CFR "+pct(td,tc)+"</div>";document.getElementById("dm").innerHTML=h;document.getElementById("dbg").classList.add("op");setTimeout(function(){dC(disease,30)},100)}
function dC(disease,days){document.querySelectorAll(".pbtn").forEach(function(b){b.classList.remove("on")});if(event&&event.target&&event.target.classList)event.target.classList.add("on");var items=allData.outbreaks.filter(function(x){return x.disease===disease});var now=new Date();var n=days<=7?7:days<=30?30:6;var buckets=new Array(n).fill(0);var labels=[];if(days<=7){for(var d=6;d>=0;d--){var dt=new Date(now-d*86400000);labels.push((dt.getMonth()+1)+"/"+dt.getDate())}items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<7)buckets[6-diff]+=x.cases||0})}else if(days<=30){buckets=new Array(30).fill(0);for(var d=29;d>=0;d--){var dt=new Date(now-d*86400000);labels.push(d%5===0?(dt.getMonth()+1)+"/"+dt.getDate():"")}items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<30)buckets[29-diff]+=x.cases||0})}else{for(var m=5;m>=0;m--){var dt=new Date(now.getFullYear(),now.getMonth()-m,1);labels.push(dt.getFullYear()+"/"+(dt.getMonth()+1))}items.forEach(function(x){var dt=new Date(x.date_reported);var diff=Math.floor((now-dt)/86400000/30);if(diff>=0&&diff<6)buckets[5-diff]+=x.cases||0})}var ctx=document.getElementById("dc");if(!ctx)return;if(myChart)myChart.destroy();myChart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{label:i("ca"),data:buckets,borderColor:"#00d4aa",backgroundColor:"rgba(0,212,170,0.08)",fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:"#00d4aa",pointBorderColor:"#0b1120",pointBorderWidth:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#7b8ba3"}}},scales:{x:{title:{display:true,text:days<=30?"Date":"Month",color:"#7b8ba3"},grid:{color:"rgba(37,48,80,0.5)"},ticks:{color:"#7b8ba3",maxRotation:0}},y:{title:{display:true,text:i("ca"),color:"#7b8ba3"},grid:{color:"rgba(37,48,80,0.5)"},ticks:{color:"#7b8ba3"},beginAtZero:true}}}})}
window.addEventListener("load",init);

</script></body></html>
