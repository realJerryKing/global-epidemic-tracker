<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Global Epidemic Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1419;--panel:#1c2733;--card:#22303c;--border:#38444d;--text:#8899a6;--bright:#e7e9ea;--muted:#657786;--red:#f4212e;--amber:#ffad1f;--green:#00ba7c;--blue:#1d9bf0;--purple:#794bc4}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px}
a{color:var(--blue);text-decoration:none}
.topbar{background:var(--red);color:white;text-align:center;padding:4px;font-size:11px;font-weight:700}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:15px;font-weight:700;color:var(--bright)}
.sel{background:var(--card);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit}
.news{background:var(--panel);border-bottom:1px solid var(--border);height:28px;overflow:hidden;display:flex;align-items:center;cursor:pointer}
.news-lbl{background:var(--red);color:white;padding:0 8px;font-size:10px;font-weight:700;height:100%;display:flex;align-items:center;flex-shrink:0}
.news-wrap{flex:1;height:100%;overflow:hidden;position:relative}
.news-inner{position:absolute;width:100%;animation:ns 10s linear infinite}
@keyframes ns{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
.ni{height:28px;line-height:28px;padding:0 12px;font-size:12px;white-space:nowrap;overflow:hidden}
.ni .dot{color:var(--red);margin-right:6px}
.filters{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filters input{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);color:var(--bright);padding:6px 12px;border-radius:6px;font-size:13px;font-family:inherit}
.filters input:focus{outline:none;border-color:var(--blue)}
.sug-box{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;max-height:200px;overflow-y:auto;z-index:100;display:none}
.sug-box div{padding:6px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--bright)}
.sug-box div:hover{background:var(--border)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border)}
.st{background:var(--panel);padding:8px;text-align:center;border-right:1px solid var(--border)}.st:last-child{border-right:none}
.stv{font-size:18px;font-weight:700}.stl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.st:nth-child(1) .stv{color:var(--red)}.st:nth-child(2) .stv{color:var(--amber)}.st:nth-child(3) .stv{color:var(--blue)}.st:nth-child(4) .stv{color:var(--purple)}.st:nth-child(5) .stv{color:var(--green)}
.main{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 190px)}
#map{width:100%;height:100%}
.leaflet-container{background:#1a2332!important}
.side{border-left:1px solid var(--border);overflow-y:auto;background:var(--panel);padding:6px}
.side::-webkit-scrollbar{width:4px}.side::-webkit-scrollbar-thumb{background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:4px;cursor:pointer;border-left:3px solid transparent;transition:all 0.1s}
.card:hover{transform:translateX(2px);border-color:var(--blue)}
.card.sc{border-left-color:var(--red)}.card.sh{border-left-color:var(--amber)}.card.sm{border-left-color:var(--blue)}.card.sl{border-left-color:var(--green)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.card-n{font-size:13px;font-weight:600;color:var(--bright);position:relative}
.card-n:hover .tip{display:block}
.tip{display:none;position:absolute;top:100%;left:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:11px;font-weight:400;color:var(--text);width:240px;z-index:50;line-height:1.4}
.badge{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600}
.b-c{background:rgba(244,33,46,0.15);color:var(--red)}.b-h{background:rgba(255,173,31,0.15);color:var(--amber)}.b-m{background:rgba(29,155,240,0.15);color:var(--blue)}.b-l{background:rgba(0,186,124,0.15);color:var(--green)}
.card-info{font-size:11px;color:var(--muted);margin-bottom:2px}
.card-nums{display:flex;gap:8px;font-size:12px}.card-nums b{color:var(--bright)}
.card-tags{display:flex;gap:3px;margin-top:3px;font-size:10px}
.tg{padding:1px 4px;border-radius:3px}
.tg-v{background:rgba(0,186,124,0.1);color:var(--green)}.tg-h{background:rgba(244,33,46,0.12);color:var(--red)}.tg-p{background:rgba(255,173,31,0.1);color:var(--amber)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}.mbg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:92%;max-width:650px;max-height:85vh;overflow-y:auto;padding:20px;position:relative}
.modal h2{color:var(--bright);font-size:17px;margin-bottom:6px}
.mcl{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.pbtns{display:flex;gap:6px;margin:10px 0}
.pb{background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.pb.on{background:var(--blue);color:white;border-color:var(--blue)}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;height:260px;margin-bottom:12px}
.ftr{background:var(--panel);border-top:1px solid var(--border);padding:5px;font-size:10px;color:var(--muted);text-align:center}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto}#map{height:40vh}}
</style>
</head>

    if(!keys.length){sg.style.display="none";doFilter();return}
    var h="";keys.forEach(function(k){var isC=k.charAt(0)==="@";
        h+='<div onclick="pickSug(\''+k.replace(/'/g,"\\'")+'\')">'+(isC?"🌍 ":"")+hits[k]+'</div>';});
    sg.innerHTML=h;sg.style.display="block";doFilter();
}
function pickSug(val){
    if(val.charAt(0)==="@"){document.getElementById("csel").value=val.substring(1);document.getElementById("q").value=""}
    else{document.getElementById("dsel").value=val;document.getElementById("q").value=""}
    document.getElementById("sug").style.display="none";doFilter();
}

function populateSelects(){
    if(!allData)return;
    var cs=document.getElementById("csel"),ds=document.getElementById("dsel");
    var cv=cs.value,dv=ds.value;
    cs.innerHTML='<option value="">'+i("allc")+'</option>';
    ds.innerHTML='<option value="">'+i("alld")+'</option>';
    var countries={},diseases={};
    allData.outbreaks.forEach(function(o){countries[o.country_iso3]=1;diseases[o.disease]=1});
    Object.keys(countries).sort(function(a,b){return cn(a).localeCompare(cn(b))}).forEach(function(iso){
        var opt=document.createElement("option");opt.value=iso;opt.textContent=cn(iso);cs.appendChild(opt)});
    Object.keys(diseases).sort(function(a,b){return dn(a).localeCompare(dn(b))}).forEach(function(d){
        var opt=document.createElement("option");opt.value=d;opt.textContent=dn(d);ds.appendChild(opt)});
    cs.value=cv;ds.value=dv;
}

function init(){
    map=L.map("map",{zoomControl:true,attributionControl:false}).setView([20,0],2);
    L.tileLayer("https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    cl=L.markerClusterGroup({maxClusterRadius:50,showCoverageOnHover:false,iconCreateFunction:function(c){var n=c.getChildCount(),r=n<5?18:n<15?26:n<50?34:42;return L.divIcon({html:'<div style="width:'+r+'px;height:'+r+'px;border-radius:50%;background:rgba(244,33,46,0.2);border:2px solid rgba(244,33,46,0.5);display:flex;align-items:center;justify-content:center;color:#f4212e;font-weight:700;font-size:'+(r<26?10:12)+'px">'+n+'</div>',className:"",iconSize:[r,r]})}});
    map.addLayer(cl);load();setInterval(load,600000);
    window.addEventListener("resize",function(){map.invalidateSize()});
    document.addEventListener("click",function(e){if(!e.target.closest(".filters"))document.getElementById("sug").style.display="none"});
}

function load(){fetch("data/epidemics.json").then(function(r){return r.json()}).then(function(d){allData=d;populateSelects();render(d)}).catch(function(e){console.error(e)})}

function render(d){
    var o=d.outbreaks.slice();
    var q=document.getElementById("q").value.toLowerCase();
    var c=document.getElementById("csel").value;
    var dis=document.getElementById("dsel").value;
    if(q)o=o.filter(function(x){var hay=(x.disease+" "+dn(x.disease)+" "+cn(x.country_iso3)+" "+x.location).toLowerCase();return hay.indexOf(q)>=0});
    if(c)o=o.filter(function(x){return x.country_iso3===c});
    if(dis)o=o.filter(function(x){return x.disease===dis});
    // Fly map to selection
    if(c||dis){var pts=o.filter(function(x){return x.latitude});if(pts.length){var lt=pts.reduce(function(s,x){return s+x.latitude},0)/pts.length;var ln=pts.reduce(function(s,x){return s+x.longitude},0)/pts.length;map.flyTo([lt,ln],dis?3:5,{duration:1})}}
    var tc=0,td=0;o.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});
    document.getElementById("stats").innerHTML='<div class="st"><div class="stv">'+o.length+'</div><div class="stl">'+i("active")+'</div></div><div class="st"><div class="stv">'+fmt(tc||null)+'</div><div class="stl">'+i("cases")+'</div></div><div class="st"><div class="stv">'+fmt(td||null)+'</div><div class="stl">'+i("deaths")+'</div></div><div class="st"><div class="stv">'+pct(td,tc)+'</div><div class="stl">'+i("cfr")+'</div></div><div class="st"><div class="stv">'+new Set(o.map(function(x){return x.country_iso3})).size+'</div><div class="stl">'+i("countries")+'</div></div>';
    renderMap(o);renderNews(d.outbreaks);renderSide(o);
}

function renderMap(o){cl.clearLayers();o.forEach(function(x){if(!x.latitude)return;var c=SC[x.severity]||"#657786",r=Math.max(4,Math.min(18,Math.sqrt(x.cases||1)*1.1));var m=L.circleMarker([x.latitude,x.longitude],{radius:r,color:c,fillColor:c,fillOpacity:0.4,weight:1.5});m.bindPopup("<b>"+dn(x.disease)+"</b>"+(x.h2h_transmission?" <b style=\"color:#f4212e\">H2H</b>":"")+"<br>📍 "+cn(x.country_iso3)+"<br>"+i("cases")+": <b>"+fmt(x.cases)+"</b> · "+i("deaths")+": <b>"+fmt(x.deaths)+"</b>"+(x.source_url?"<br><a href=\""+x.source_url+"\" target=\"_blank\">WHO →</a>":""));cl.addLayer(m)})}

function renderNews(o){var top=o.filter(function(x){return x.description&&x.cases>0}).sort(function(a,b){return new Date(b.date_reported)-new Date(a.date_reported)}).slice(0,12);var h="";top.forEach(function(x){h+='<div class="ni"><span class="dot">●</span>'+dn(x.disease)+" — "+cn(x.country_iso3)+": "+(x.description||"").substring(0,60)+"</div>"});document.getElementById("nlist").innerHTML=h+h}

function renderSide(o){
    var g={};o.forEach(function(x){var k=x.disease;if(!g[k])g[k]={disease:k,cases:0,deaths:0,severity:"low",h2h:false,countries:new Set(),items:[]};var d=g[k];d.cases+=x.cases||0;d.deaths+=x.deaths||0;d.countries.add(x.country_iso3);d.items.push(x);if(x.h2h_transmission)d.h2h=true;if((SO[x.severity]||9)<(SO[d.severity]||9))d.severity=x.severity});
    var list=Object.values(g).sort(function(a,b){return(SO[a.severity]||9)-(SO[b.severity]||9)});
    var h="";list.forEach(function(x){
        var cls=x.severity==="very_high"?"sc":x.severity==="high"?"sh":x.severity==="moderate"?"sm":"sl";
        var bg=x.severity==="very_high"?"b-c":x.severity==="high"?"b-h":x.severity==="moderate"?"b-m":"b-l";
        var tip=gtip(x.disease);var tt=tip?'<span class="tip">'+tip+"</span>":"";
        var h2h=x.h2h?'<span class="tg tg-h">H2H</span>':"";
        h+='<div class="card '+cls+'" onclick="openDisease(\''+x.disease.replace(/'/g,"\\'")+'\')"><div class="card-h"><span class="card-n">'+dn(x.disease)+tt+'</span><span class="badge '+bg+'">'+sevLbl(x.severity)+'</span></div><div class="card-info">'+x.countries.size+" "+i("countries")+'</div><div class="card-nums"><span>'+i("cases")+": <b>"+fmt(x.cases)+"</b></span><span>"+i("deaths")+": <b>"+fmt(x.deaths)+"</b></span><span>CFR: "+pct(x.deaths,x.cases)+'</span></div><div class="card-tags">'+h2h+"</div></div>"});
    document.getElementById("side").innerHTML=h;
}

function openNews(){var o=allData.outbreaks.filter(function(x){return x.description&&x.cases>0}).sort(function(a,b){return new Date(b.date_reported)-new Date(a.date_reported)}).slice(0,30);var h="";o.forEach(function(x){h+='<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--red)">●</span> <b>'+dn(x.disease)+"</b> — "+cn(x.country_iso3)+"<br>"+(x.description||"").substring(0,120)+(x.source_url?' <a href="'+x.source_url+'" target="_blank">WHO→</a>':"")+"</div>"});document.getElementById("nall").innerHTML=h;document.getElementById("ntitle").textContent=i("brk");document.getElementById("nbg").classList.add("open")}

function openDisease(disease){
    // Filter map to only this disease
    document.getElementById("dsel").value=disease;doFilter();
    // Show modal with stats
    var items=allData.outbreaks.filter(function(x){return x.disease===disease});
    var tc=0,td=0;items.forEach(function(x){tc+=x.cases||0;td+=x.deaths||0});
    var tip=gtip(disease);var now=new Date();
    var p7=0,p30=0,p180=0;items.forEach(function(x){var d=(now-new Date(x.date_reported))/86400000;if(d<=7)p7+=x.cases||0;if(d<=30)p30+=x.cases||0;if(d<=180)p180+=x.cases||0});
    var h='<button class="mcl" onclick="document.getElementById(\'dbg\').classList.remove(\'open\')">&times;</button>';
    h+="<h2>"+dn(disease)+"</h2>";
    if(tip)h+='<p style="font-size:12px;color:var(--text);margin-bottom:8px">'+tip+"</p>";
    h+='<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+items.length+" outbreaks · "+new Set(items.map(function(x){return x.country_iso3})).size+" "+i("countries")+"</div>";
    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px"><div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--red)">'+fmt(p7||null)+'</div><div style="font-size:10px;color:var(--muted)">'+i("d7")+'</div></div><div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--amber)">'+fmt(p30||null)+'</div><div style="font-size:10px;color:var(--muted)">'+i("d30")+'</div></div><div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--blue)">'+fmt(p180||null)+'</div><div style="font-size:10px;color:var(--muted)">'+i("d180")+"</div></div></div>";
    h+='<div class="pbtns"><button class="pb" onclick="drawChart(\''+disease.replace(/'/g,"\\'")+'\',7)">'+i("d7")+'</button><button class="pb on" onclick="drawChart(\''+disease.replace(/'/g,"\\'")+'\',30)">'+i("d30")+'</button><button class="pb" onclick="drawChart(\''+disease.replace(/'/g,"\\'")+'\',180)">'+i("d180")+"</button></div>";
    h+='<div class="cbox"><canvas id="dc"></canvas></div>';
    h+='<div style="font-size:13px;color:var(--bright);font-weight:600">'+i("total")+": "+(tc?tc.toLocaleString():"—")+" "+i("cases")+" · "+(td?td.toLocaleString():"—")+" "+i("deaths")+" · CFR "+pct(td,tc)+"</div>";
    document.getElementById("dmod").innerHTML=h;document.getElementById("dbg").classList.add("open");
    setTimeout(function(){drawChart(disease,30)},100);
}

function drawChart(disease,days){
    document.querySelectorAll(".pb").forEach(function(b){b.classList.remove("on")});
    if(event&&event.target&&event.target.classList)event.target.classList.add("on");
    var items=allData.outbreaks.filter(function(x){return x.disease===disease});var now=new Date();
    var n=days<=7?7:days<=30?30:6;var buckets=new Array(n).fill(0);var labels=[];
    if(days<=7){for(var d=6;d>=0;d--){var dt=new Date(now-d*86400000);labels.push((dt.getMonth()+1)+"/"+dt.getDate())}items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<7)buckets[6-diff]+=x.cases||0})}
    else if(days<=30){buckets=new Array(30).fill(0);for(var d=29;d>=0;d--){var dt=new Date(now-d*86400000);labels.push(d%5===0?(dt.getMonth()+1)+"/"+dt.getDate():"")}items.forEach(function(x){var diff=Math.floor((now-new Date(x.date_reported))/86400000);if(diff>=0&&diff<30)buckets[29-diff]+=x.cases||0})}
    else{for(var m=5;m>=0;m--){var dt=new Date(now.getFullYear(),now.getMonth()-m,1);labels.push(dt.getFullYear()+"/"+(dt.getMonth()+1))}items.forEach(function(x){var dt=new Date(x.date_reported);var diff=Math.floor((now-dt)/86400000/30);if(diff>=0&&diff<6)buckets[5-diff]+=x.cases||0})}
    var ctx=document.getElementById("dc");if(!ctx)return;
    if(myChart)myChart.destroy();
    myChart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{label:i("cases"),data:buckets,borderColor:"#1d9bf0",backgroundColor:"rgba(29,155,240,0.08)",fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:"#1d9bf0",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8899a6"}}},scales:{x:{title:{display:true,text:days<=30?"Date":"Month",color:"#8899a6"},grid:{color:"rgba(56,68,77,0.4)"},ticks:{color:"#8899a6",maxRotation:0}},y:{title:{display:true,text:i("cases"),color:"#8899a6"},grid:{color:"rgba(56,68,77,0.4)"},ticks:{color:"#8899a6"},beginAtZero:true}}}});
}

window.addEventListener("load",init);
</script>
</body>
</html>
